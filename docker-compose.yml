services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-haru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haru}
      POSTGRES_DB: ${POSTGRES_DB:-haru}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-haru}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      PORT: ${PORT:-8080}
      DB_DRIVER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-haru}:${POSTGRES_PASSWORD:-haru}@db:5432/${POSTGRES_DB:-haru}?sslmode=disable
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Asia/Seoul}
      VOICE_PARSE_PROMPT_PATH: /prompts/voice_parse.txt
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
